name: quraex

# Full local stack — application services on top of the infra in docker-compose.yml,
# with NO Aspire required. This is the "works the same on every machine" path:
# pinned base images + Dockerfiles mean a teammate gets an identical runtime.
#
# Run together with the infra file:
#   docker compose -f docker-compose.yml -f docker-compose.app.yml up --build
# or simply: `make up`
#
# Targets the Development environment for parity with `aspire run`: EF migrations
# auto-apply on startup and the committed dev JWT public key is used. This file is
# for local/CI parity — production deployment uses real secrets + a migration job.

services:
  authoring:
    build:
      context: .
      dockerfile: services/authoring/QuraEx.Authoring.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      # Override appsettings "localhost" with the in-network container hostnames.
      ConnectionStrings__postgres-authoring: "Host=postgres-authoring;Port=5432;Database=authoring;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: "${RABBITMQ_USER:-guest}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:-guest}"
    ports:
      - "${AUTHORING_PORT:-8081}:8080"   # direct access for debugging; gateway is the real entry
    depends_on:
      postgres-authoring:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/QuraEx.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      # Service discovery: resolve YARP's logical "authoring" destination to the container.
      services__authoring__http__0: "http://authoring:8080"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"     # public entry point
    depends_on:
      authoring:
        condition: service_healthy
    restart: unless-stopped
