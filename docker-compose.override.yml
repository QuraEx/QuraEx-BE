name: quraex

# Application services — auto-merged by `docker compose up` (Docker Compose v2 auto-loads
# docker-compose.override.yml on top of docker-compose.yml when both files are present).
#
# Plain `docker compose up -d` merges infra + app automatically — no -f flags needed.
# To run infra only (for IDE / Aspire mode): docker compose -f docker-compose.yml up -d
#
# Targets the Development environment for parity with `aspire run`: EF migrations
# auto-apply on startup and the committed dev JWT public key is used. This file is
# for local/CI parity — production deployment uses real secrets + a migration job.

services:
  authoring:
    build:
      context: .
      dockerfile: services/authoring/QuraEx.Authoring.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      # Override appsettings "localhost" with the in-network container hostnames.
      ConnectionStrings__postgres-authoring: "Host=postgres-authoring;Port=5432;Database=authoring;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: "${RABBITMQ_USER:-guest}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:-guest}"
    ports:
      - "${AUTHORING_PORT:-8081}:8080"   # direct access for debugging; gateway is the real entry
    depends_on:
      postgres-authoring:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  identity:
    build:
      context: .
      dockerfile: services/identity/QuraEx.Identity.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__postgres-identity: "Host=postgres-identity;Port=5432;Database=identity;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: "${RABBITMQ_USER:-guest}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:-guest}"
    ports:
      - "${IDENTITY_PORT:-8082}:8080"   # direct access for debugging; gateway is the real entry
    depends_on:
      postgres-identity:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  workspace:
    build:
      context: .
      dockerfile: services/workspace/QuraEx.Workspace.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__postgres-workspace: "Host=postgres-workspace;Port=5432;Database=workspace;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: "${RABBITMQ_USER:-guest}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:-guest}"
    ports:
      - "${WORKSPACE_PORT:-8083}:8080"  # direct access for debugging; gateway is the real entry
    depends_on:
      postgres-workspace:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/QuraEx.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      # Service discovery: resolve YARP's logical destinations to in-network container hostnames.
      services__authoring__http__0: "http://authoring:8080"
      services__identity__http__0: "http://identity:8080"
      services__workspace__http__0: "http://workspace:8080"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"     # public entry point
    depends_on:
      authoring:
        condition: service_healthy
      identity:
        condition: service_healthy
      workspace:
        condition: service_healthy
    restart: unless-stopped

# >>> new-service app (managed by scripts/new-service.sh) <<<
