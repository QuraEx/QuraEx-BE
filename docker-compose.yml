name: quraex

# Mirrors Aspire infra — use for CI or when running without Aspire.
# Connection strings match Aspire's injected values so switching between modes needs no code change.

services:
  # ── Database (one per service, mirrors prod DB-per-service isolation) ──────
  postgres-authoring:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: authoring
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_AUTHORING_PORT:-5432}:5432"
    volumes:
      - postgres_authoring_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d authoring"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-identity:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_IDENTITY_PORT:-5433}:5432"
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d identity"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-workspace:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: workspace
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_WORKSPACE_PORT:-5434}:5432"
    volumes:
      - postgres_workspace_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d workspace"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Message Broker ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  # ── Cache ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# >>> new-service postgres (managed by scripts/new-service.sh) <<<

volumes:
  postgres_authoring_data:
  postgres_identity_data:
  postgres_workspace_data:
# >>> new-service volume (managed by scripts/new-service.sh) <<<
