name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Maps GITHUB_TOKEN → nuget.config's %GITHUB_PACKAGES_TOKEN% placeholder
  GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ── Path filter — only build what changed ──────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      building-blocks: ${{ steps.filter.outputs.building-blocks }}
      gateway: ${{ steps.filter.outputs.gateway }}
      authoring: ${{ steps.filter.outputs.authoring }}
      identity: ${{ steps.filter.outputs.identity }}
      workspace: ${{ steps.filter.outputs.workspace }}
      aspire: ${{ steps.filter.outputs.aspire }}
      any-cs: ${{ steps.filter.outputs.any-cs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            building-blocks:
              - 'building-blocks/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - '.github/workflows/ci.yml'
            gateway:
              - 'gateway/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - '.github/workflows/ci.yml'
            authoring:
              - 'services/authoring/**'
              - 'building-blocks/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - '.github/workflows/ci.yml'
            identity:
              - 'services/identity/**'
              - 'building-blocks/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - '.github/workflows/ci.yml'
            workspace:
              - 'services/workspace/**'
              - 'building-blocks/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - '.github/workflows/ci.yml'
            aspire:
              - 'aspire/**'
              - '.github/workflows/ci.yml'
            any-cs:
              - '**.cs'
              - '**.csproj'
              - '**.props'
              - '**.targets'
              - '**.slnx'
              - '.github/workflows/ci.yml'

  # ── Build + Test matrix ────────────────────────────────────────────────────
  build-test:
    name: Build & Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any-cs == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: building-blocks
            project: building-blocks/QuraEx.BuildingBlocks/QuraEx.BuildingBlocks.csproj
            changed: ${{ needs.changes.outputs.building-blocks }}
          - service: gateway
            project: gateway/QuraEx.Gateway/QuraEx.Gateway.csproj
            changed: ${{ needs.changes.outputs.gateway }}
          - service: authoring
            project: services/authoring/QuraEx.Authoring.Api/QuraEx.Authoring.Api.csproj
            test-project: services/authoring/QuraEx.Authoring.Tests/QuraEx.Authoring.Tests.csproj
            infra-project: services/authoring/QuraEx.Authoring.Infrastructure
            changed: ${{ needs.changes.outputs.authoring }}
          - service: identity
            project: services/identity/QuraEx.Identity.Api/QuraEx.Identity.Api.csproj
            test-project: services/identity/QuraEx.Identity.Tests/QuraEx.Identity.Tests.csproj
            infra-project: services/identity/QuraEx.Identity.Infrastructure
            changed: ${{ needs.changes.outputs.identity }}
          - service: workspace
            project: services/workspace/QuraEx.Workspace.Api/QuraEx.Workspace.Api.csproj
            test-project: services/workspace/QuraEx.Workspace.Tests/QuraEx.Workspace.Tests.csproj
            infra-project: services/workspace/QuraEx.Workspace.Infrastructure
            changed: ${{ needs.changes.outputs.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore NuGet packages
        run: dotnet restore QuraEx.slnx

      - name: Build (warnings-as-errors + StyleCop/Sonar via .editorconfig)
        run: dotnet build ${{ matrix.project }} --no-restore -c Release

      - name: Run integration tests (Testcontainers — real Postgres)
        if: matrix.test-project != ''
        run: |
          dotnet test ${{ matrix.test-project }} \
            -c Release \
            --no-restore \
            /p:CollectCoverage=true \
            /p:Threshold=60 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results-${{ matrix.service }}.trx"

      - name: Check migration drift (entity model vs snapshot)
        if: matrix.infra-project != ''
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project ${{ matrix.infra-project }} \
            --startup-project ${{ matrix.project }} \
            --configuration Release \
            --no-build

      - name: Upload coverage report
        if: matrix.test-project != '' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: coverage/

  # ── PR title lint (Conventional Commits) ───────────────────────────────────
  pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate Conventional Commit format
        # Use env var to prevent shell injection from untrusted PR title input
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|refactor|test|build|ci|perf|revert|style)(\([a-z0-9-]+\))?: .{1,100}$'
          if ! printf '%s' "$PR_TITLE" | grep -qP "$PATTERN"; then
            echo "❌  PR title must follow Conventional Commits:"
            echo "    Expected: type(scope): description"
            echo "    Allowed types: feat | fix | refactor | test | build | ci | perf | revert | style"
            exit 1
          fi
          echo "✅  PR title OK"

  # ── Security scan ──────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any-cs == 'true' || github.event_name == 'push'
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore QuraEx.slnx

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Build for CodeQL
        run: dotnet build QuraEx.slnx -c Release --no-restore

      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Check vulnerable packages
        shell: bash
        run: |
          set -o pipefail
          dotnet list QuraEx.slnx package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -Eqi "has the following vulnerable packages|No assets file|Skipping restore for project|error " vuln.txt; then
            echo "❌  NuGet vulnerability check failed — see output above."
            exit 1
          fi
          echo "✅  No vulnerable packages found."

  # ── Aggregate gate — the single required status check ──────────────────────
  # Branch protection requires only this job. It passes when every gating job
  # either succeeded or was skipped by the path filter, so doc-only / infra-only
  # PRs (where build-test & security don't run) merge cleanly instead of hanging
  # forever on required checks that never report.
  ci-gate:
    name: CI Gate
    if: always()
    needs: [changes, build-test, security]
    runs-on: ubuntu-latest
    steps:
      - name: Verify gating jobs passed or were skipped
        run: |
          failed=0
          for r in \
            "changes:${{ needs.changes.result }}" \
            "build-test:${{ needs.build-test.result }}" \
            "security:${{ needs.security.result }}"; do
            name="${r%%:*}"; res="${r##*:}"
            echo "$name = $res"
            if [ "$res" = "failure" ] || [ "$res" = "cancelled" ]; then
              echo "::error::Gating job '$name' did not pass ($res)."
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] && echo "✅  All gating jobs passed or were skipped." || exit 1

  # ── Pack & Push BuildingBlocks to GitHub Packages (main only) ─────────────
  pack-push:
    name: Pack & Push BuildingBlocks
    runs-on: ubuntu-latest
    needs: [changes, build-test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.building-blocks == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore QuraEx.slnx

      - name: Pack BuildingBlocks
        run: |
          dotnet pack building-blocks/QuraEx.BuildingBlocks/QuraEx.BuildingBlocks.csproj \
            --no-restore -c Release -o /tmp/packages
          dotnet pack building-blocks/QuraEx.BuildingBlocks.Messaging/QuraEx.BuildingBlocks.Messaging.csproj \
            --no-restore -c Release -o /tmp/packages

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push /tmp/packages/*.nupkg \
            --source "https://nuget.pkg.github.com/bavanchun/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

  # ── Publish service images to GHCR (main only) ─────────────────────────────
  publish-images:
    name: Publish image — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [changes, build-test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            dockerfile: gateway/QuraEx.Gateway/Dockerfile
          - name: authoring
            dockerfile: services/authoring/QuraEx.Authoring.Api/Dockerfile
          - name: identity
            dockerfile: services/identity/QuraEx.Identity.Api/Dockerfile
          - name: workspace
            dockerfile: services/workspace/QuraEx.Workspace.Api/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (context = repo root)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/quraex-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/quraex-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to the droplet over SSH (main only) ─────────────────────────────
  # Cloudflare Tunnel fronts the stack, so no inbound ports — deploy is just
  # "scp the prod compose, then pull the new images and restart".
  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    needs: publish-images
    # Gated on a repo variable so the job stays skipped until the droplet + secrets
    # are ready. Set Actions variable DEPLOY_ENABLED=true to turn deploys on.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Copy prod compose to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: deploy/docker-compose.prod.yml
          target: /opt/quraex
          strip_components: 1
      - name: Pull images and restart stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          # IMAGE_TAG from the shell overrides .env so we deploy this exact commit.
          script: |
            cd /opt/quraex
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
